<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Cream Parlour Slideshow</title>
  <style>
    :root {
      --bg1: #fff5dc;
      --bg2: #ffd8d8;
      --bg3: #d6f5ff;
      --text: #2b1b28;
      --card: #ffffffee;
      --accent: #ff5d5d;
      --border: #ffd3d3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, #fffbe9 0%, transparent 36%),
        radial-gradient(circle at 88% 16%, #def6ff 0%, transparent 36%),
        radial-gradient(circle at 52% 92%, #ffe3ea 0%, transparent 35%),
        linear-gradient(130deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .hero {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      color: var(--accent);
    }

    .hero p {
      margin: 8px 0 0;
      font-weight: 600;
    }

    .status {
      margin-top: 8px;
      font-weight: 700;
    }

    .status.error {
      color: #b4232f;
    }

    .slideshow {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .stage {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      min-height: 52vh;
      display: grid;
      place-items: center;
      border: 1px solid #ededed;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .caption {
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #3a2432;
      text-align: center;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(95deg, #c7365f, #8f2a7b);
      box-shadow: 0 6px 14px rgba(255, 59, 106, 0.25);
    }

    .counter {
      font-weight: 700;
      color: #3a2432;
    }

    .dots {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border: none;
      border-radius: 50%;
      padding: 0;
      background: #d7cbd0;
      cursor: pointer;
    }

    .dot.active {
      background: #ff5d5d;
      transform: scale(1.2);
    }

    @media (max-width: 700px) {
      .controls {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Ice Cream Parlour Presentation Slides</h1>
      <p>This page runs as a slideshow using images from the slides folder.</p>
      <div id="status" class="status">Loading slides...</div>
    </section>

    <section class="slideshow" aria-live="polite">
      <div class="stage">
        <img id="slideImage" alt="Slide" />
      </div>

      <div id="caption" class="caption"></div>

      <div class="controls">
        <div class="group">
          <button id="prevBtn" class="btn" type="button">Previous</button>
          <button id="nextBtn" class="btn" type="button">Next</button>
          <button id="toggleBtn" class="btn" type="button">Pause</button>
        </div>
        <div id="counter" class="counter">Slide 0 / 0</div>
      </div>

      <div id="dots" class="dots"></div>
    </section>
  </main>

  <script type="module">
    const statusEl = document.getElementById("status");
    const imageEl = document.getElementById("slideImage");
    const captionEl = document.getElementById("caption");
    const counterEl = document.getElementById("counter");
    const dotsEl = document.getElementById("dots");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const toggleBtn = document.getElementById("toggleBtn");

    let files = [];
    let current = 0;
    let autoplay = true;
    let timer = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function slideNumber(name) {
      const match = name.match(/(\d+)/);
      return match ? Number(match[1]) : 0;
    }

    function updateButtons() {
      toggleBtn.textContent = autoplay ? "Pause" : "Play";
    }

    function renderDots() {
      dotsEl.innerHTML = "";
      files.forEach((_, idx) => {
        const dot = document.createElement("button");
        dot.className = "dot" + (idx === current ? " active" : "");
        dot.type = "button";
        dot.setAttribute("aria-label", `Go to slide ${idx + 1}`);
        dot.addEventListener("click", () => {
          current = idx;
          renderSlide();
          restartAuto();
        });
        dotsEl.appendChild(dot);
      });
    }

    function renderSlide() {
      if (!files.length) {
        imageEl.removeAttribute("src");
        captionEl.textContent = "";
        counterEl.textContent = "Slide 0 / 0";
        dotsEl.innerHTML = "";
        return;
      }

      const name = files[current];
      imageEl.src = `slides/${name}`;
      imageEl.alt = `Slide ${current + 1}`;
      captionEl.textContent = `Slide ${slideNumber(name) || current + 1}`;
      counterEl.textContent = `Slide ${current + 1} / ${files.length}`;
      renderDots();
    }

    function nextSlide() {
      if (!files.length) return;
      current = (current + 1) % files.length;
      renderSlide();
    }

    function prevSlide() {
      if (!files.length) return;
      current = (current - 1 + files.length) % files.length;
      renderSlide();
    }

    function startAuto() {
      clearInterval(timer);
      if (autoplay && files.length > 1) {
        timer = setInterval(nextSlide, 3000);
      }
    }

    function restartAuto() {
      if (autoplay) {
        startAuto();
      }
    }

    function toggleAutoplay() {
      autoplay = !autoplay;
      updateButtons();
      if (autoplay) {
        startAuto();
      } else {
        clearInterval(timer);
        timer = null;
      }
    }

    async function init() {
      try {
        const res = await fetch("slides/manifest.json", { cache: "no-store" });
        if (!res.ok) {
          throw new Error("Could not load slides/manifest.json");
        }

        files = await res.json();
        if (!Array.isArray(files) || files.length === 0) {
          throw new Error("No slide images found in manifest.");
        }

        files.sort((a, b) => slideNumber(a) - slideNumber(b));
        current = 0;
        renderSlide();
        updateButtons();
        startAuto();
        setStatus(`Loaded ${files.length} slide images as slideshow.`);
      } catch (err) {
        files = [];
        current = 0;
        renderSlide();
        setStatus(`Failed to load slides: ${err.message}`, true);
      }
    }

    prevBtn.addEventListener("click", () => {
      prevSlide();
      restartAuto();
    });

    nextBtn.addEventListener("click", () => {
      nextSlide();
      restartAuto();
    });

    toggleBtn.addEventListener("click", () => {
      toggleAutoplay();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        nextSlide();
        restartAuto();
      }
      if (event.key === "ArrowLeft") {
        prevSlide();
        restartAuto();
      }
      if (event.code === "Space") {
        event.preventDefault();
        toggleAutoplay();
      }
    });

    await init();
  </script>
</body>
</html>
